<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <marker id="arr-main" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#2D3748"/>
    </marker>
    <marker id="arr-blue" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#4A90D9"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#48BB78"/>
    </marker>
    <marker id="arr-orange" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#E2711D"/>
    </marker>
    <marker id="arr-purple" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#805AD5"/>
    </marker>
    <linearGradient id="grad-enc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EBF8FF"/>
      <stop offset="100%" stop-color="#BEE3F8"/>
    </linearGradient>
    <linearGradient id="grad-game" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#E9D8FD"/>
    </linearGradient>
    <linearGradient id="grad-ctrl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FFF4"/>
      <stop offset="100%" stop-color="#C6F6D5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" fill="#FAFBFC" rx="8"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1A202C">E-Game-C World Model Architecture</text>
  <text x="480" y="52" text-anchor="middle" font-size="11" fill="#718096">Encoder (Lévy-Itô) → Mean-Field Game (Lasry-Lions) → Controller (Stochastic Lyapunov)</text>
  <line x1="50" y1="64" x2="910" y2="64" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ===== INPUT: RAW MARKET DATA ===== -->
  <rect x="50" y="80" width="160" height="100" rx="6" fill="#F7FAFC" stroke="#CBD5E0" stroke-width="1.5"/>
  <text x="130" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#4A5568">RAW MARKET DATA</text>
  <line x1="60" y1="107" x2="200" y2="107" stroke="#E2E8F0" stroke-width="1"/>
  <text x="65" y="121" font-size="9.5" fill="#718096">S_t (prices)</text>
  <text x="65" y="135" font-size="9.5" fill="#718096">V_t (volume)</text>
  <text x="65" y="149" font-size="9.5" fill="#718096">LOB depth</text>
  <text x="65" y="163" font-size="9.5" fill="#718096">τ ∈ [0, T] ticks</text>

  <!-- Arrow: input → encoder -->
  <line x1="210" y1="130" x2="258" y2="130" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arr-main)"/>

  <!-- ===== E: ENCODER MODULE ===== -->
  <rect x="260" y="74" width="190" height="370" rx="8" fill="url(#grad-enc)" stroke="#4A90D9" stroke-width="2"/>
  <text x="355" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#2B6CB0">E — ENCODER</text>
  <line x1="270" y1="104" x2="440" y2="104" stroke="#90CDF4" stroke-width="1"/>

  <!-- Lévy-Itô block -->
  <rect x="272" y="112" width="166" height="88" rx="5" fill="white" stroke="#63B3ED" stroke-width="1.5"/>
  <text x="355" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#2C5282">Lévy-Itô Decomposition</text>
  <text x="278" y="148" font-size="9.5" fill="#2D3748">dX_τ = b(X_τ)dτ</text>
  <text x="278" y="162" font-size="9.5" fill="#2D3748">  + σ(X_τ) dW_τ</text>
  <text x="278" y="176" font-size="9.5" fill="#2D3748">  + ∫ γ(X_{τ−},z) Ñ(dτ,dz)</text>
  <text x="278" y="192" font-size="8.5" fill="#718096">Ñ = N − ν (compensated Poisson)</text>

  <!-- Arrow within encoder -->
  <line x1="355" y1="200" x2="355" y2="218" stroke="#4A90D9" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-blue)"/>

  <!-- Bipower block -->
  <rect x="272" y="220" width="166" height="70" rx="5" fill="white" stroke="#63B3ED" stroke-width="1.5"/>
  <text x="355" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#2C5282">Bipower Variation</text>
  <text x="278" y="253" font-size="9.5" fill="#2D3748">BV_T = μ₁⁻² Σ|ΔX_{i−1}||ΔX_i|</text>
  <text x="278" y="267" font-size="9.5" fill="#2D3748">RV_T − BV_T → Σ_τ (physical)</text>
  <text x="278" y="281" font-size="8.5" fill="#718096">Separate σ² from jump ν_η</text>

  <!-- Arrow -->
  <line x1="355" y1="290" x2="355" y2="306" stroke="#4A90D9" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-blue)"/>

  <!-- Groupoid block -->
  <rect x="272" y="308" width="166" height="70" rx="5" fill="white" stroke="#63B3ED" stroke-width="1.5"/>
  <text x="355" y="325" text-anchor="middle" font-size="10" font-weight="600" fill="#2C5282">Topological Groupoid</text>
  <text x="278" y="341" font-size="9.5" fill="#2D3748">Events: mergers, halts, listings</text>
  <text x="278" y="355" font-size="9.5" fill="#2D3748">𝒢 = {(g,h): s(g)=t(h)}</text>
  <text x="278" y="369" font-size="8.5" fill="#718096">Dimension-varying state space</text>

  <!-- Arrow -->
  <line x1="355" y1="378" x2="355" y2="394" stroke="#4A90D9" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-blue)"/>

  <!-- Output label: latent state -->
  <rect x="272" y="398" width="166" height="36" rx="5" fill="#EBF8FF" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="355" y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#2B6CB0">Latent State Z_t</text>
  <text x="355" y="427" text-anchor="middle" font-size="9" fill="#4A5568">(Σ_τ, ν_η, groupoid structure)</text>

  <!-- ===== Arrow E → Game ===== -->
  <line x1="450" y1="290" x2="498" y2="290" stroke="#2D3748" stroke-width="1.8" marker-end="url(#arr-main)"/>
  <text x="474" y="285" text-anchor="middle" font-size="8.5" fill="#4A5568">Z_t</text>

  <!-- ===== G: MEAN-FIELD GAME MODULE ===== -->
  <rect x="500" y="74" width="210" height="370" rx="8" fill="url(#grad-game)" stroke="#805AD5" stroke-width="2"/>
  <text x="605" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#553C9A">G — MEAN-FIELD GAME</text>
  <line x1="510" y1="104" x2="700" y2="104" stroke="#D6BCFA" stroke-width="1"/>

  <!-- HJB equation -->
  <rect x="512" y="112" width="186" height="90" rx="5" fill="white" stroke="#B794F4" stroke-width="1.5"/>
  <text x="605" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#553C9A">HJB Equation (agent)</text>
  <text x="518" y="148" font-size="9.5" fill="#2D3748">−∂_t u = ℋ(x, Du, m_t)</text>
  <text x="518" y="163" font-size="9.5" fill="#2D3748">u(T, x) = g(x, m_T)</text>
  <text x="518" y="178" font-size="8.5" fill="#718096">DGM solver (Sirignano & Spiliopoulos)</text>
  <text x="518" y="190" font-size="8.5" fill="#718096">u ≈ U_θ(t,x,m) via neural PDE</text>

  <!-- Arrow within game -->
  <line x1="605" y1="202" x2="605" y2="218" stroke="#805AD5" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-purple)"/>

  <!-- FPK equation -->
  <rect x="512" y="220" width="186" height="72" rx="5" fill="white" stroke="#B794F4" stroke-width="1.5"/>
  <text x="605" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#553C9A">FPK Equation (crowd)</text>
  <text x="518" y="253" font-size="9.5" fill="#2D3748">∂_t m = −div(b* m) + ½Δ(a m)</text>
  <text x="518" y="267" font-size="9.5" fill="#2D3748">m(0,·) = m₀</text>
  <text x="518" y="283" font-size="8.5" fill="#718096">b*(x,m) = −D_p ℋ(x, Du(t,x), m)</text>

  <!-- Arrow -->
  <line x1="605" y1="292" x2="605" y2="308" stroke="#805AD5" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-purple)"/>

  <!-- Monotonicity & Fixed Point -->
  <rect x="512" y="310" width="186" height="72" rx="5" fill="white" stroke="#B794F4" stroke-width="1.5"/>
  <text x="605" y="327" text-anchor="middle" font-size="10" font-weight="600" fill="#553C9A">Equilibrium Existence</text>
  <text x="518" y="343" font-size="9.5" fill="#2D3748">Schauder fixed-point: ∃ m* ∈ 𝒫</text>
  <text x="518" y="357" font-size="9.5" fill="#2D3748">Lasry-Lions monotonicity → unique</text>
  <text x="518" y="371" font-size="8.5" fill="#718096">∫(F(m)−F(m̃))(m−m̃) ≥ 0</text>

  <!-- Arrow -->
  <line x1="605" y1="382" x2="605" y2="398" stroke="#805AD5" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-purple)"/>

  <!-- Output: optimal policy -->
  <rect x="512" y="400" width="186" height="34" rx="5" fill="#FAF5FF" stroke="#805AD5" stroke-width="1.5"/>
  <text x="605" y="415" text-anchor="middle" font-size="10" font-weight="600" fill="#553C9A">Optimal Policy π*(t, x, m)</text>
  <text x="605" y="428" text-anchor="middle" font-size="9" fill="#4A5568">MFG equilibrium flow m*</text>

  <!-- ===== Arrow Game → Controller ===== -->
  <line x1="710" y1="290" x2="758" y2="290" stroke="#2D3748" stroke-width="1.8" marker-end="url(#arr-main)"/>
  <text x="734" y="285" text-anchor="middle" font-size="8.5" fill="#4A5568">π*,m*</text>

  <!-- ===== C: CONTROLLER MODULE ===== -->
  <rect x="760" y="74" width="150" height="370" rx="8" fill="url(#grad-ctrl)" stroke="#48BB78" stroke-width="2"/>
  <text x="835" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#276749">C — CONTROLLER</text>
  <line x1="770" y1="104" x2="900" y2="104" stroke="#9AE6B4" stroke-width="1"/>

  <!-- McKean-Vlasov -->
  <rect x="772" y="112" width="126" height="76" rx="5" fill="white" stroke="#68D391" stroke-width="1.5"/>
  <text x="835" y="129" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">McKean-Vlasov</text>
  <text x="778" y="145" font-size="9" fill="#2D3748">dX_t^i = b(X_t^i, m_t)dt</text>
  <text x="778" y="159" font-size="9" fill="#2D3748">  + σ(X_t^i, m_t) dW_t^i</text>
  <text x="778" y="173" font-size="9" fill="#2D3748">  + ∫γ(·,z) Ñ(dt,dz)</text>
  <text x="778" y="184" font-size="7.5" fill="#718096">m_t = Law(X_t^i)</text>

  <!-- Arrow -->
  <line x1="835" y1="188" x2="835" y2="206" stroke="#48BB78" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-green)"/>

  <!-- Lyapunov stability -->
  <rect x="772" y="208" width="126" height="76" rx="5" fill="white" stroke="#68D391" stroke-width="1.5"/>
  <text x="835" y="225" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">Stoch. Lyapunov</text>
  <text x="778" y="241" font-size="9" fill="#2D3748">V(x) = |x|²</text>
  <text x="778" y="255" font-size="9" fill="#2D3748">ℒV ≤ −λV + C</text>
  <text x="778" y="269" font-size="9" fill="#2D3748">→ unique invariant μ∞</text>
  <text x="778" y="280" font-size="7.5" fill="#718096">Exponential convergence rate λ</text>

  <!-- Arrow -->
  <line x1="835" y1="284" x2="835" y2="300" stroke="#48BB78" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-green)"/>

  <!-- Cramér-Rao -->
  <rect x="772" y="302" width="126" height="68" rx="5" fill="white" stroke="#68D391" stroke-width="1.5"/>
  <text x="835" y="319" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">Cramér-Rao Bound</text>
  <text x="778" y="335" font-size="9" fill="#2D3748">Var(θ̂) ≥ 1/I(θ)</text>
  <text x="778" y="349" font-size="9" fill="#2D3748">I(θ) = Σ_τ⊕ ν_η</text>
  <text x="778" y="363" font-size="8.5" fill="#718096">Prediction floor: irreducible</text>

  <!-- Arrow -->
  <line x1="835" y1="370" x2="835" y2="386" stroke="#48BB78" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr-green)"/>

  <!-- Output -->
  <rect x="772" y="388" width="126" height="46" rx="5" fill="#F0FFF4" stroke="#48BB78" stroke-width="1.5"/>
  <text x="835" y="406" text-anchor="middle" font-size="10" font-weight="600" fill="#276749">Trading Signal</text>
  <text x="835" y="419" text-anchor="middle" font-size="9" fill="#4A5568">u*(t) with risk bounds</text>
  <text x="835" y="430" text-anchor="middle" font-size="8.5" fill="#718096">P(‖u−u*‖>ε) ≤ δ</text>

  <!-- ===== OUTPUT ===== -->
  <line x1="910" y1="415" x2="946" y2="415" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arr-main)"/>

  <!-- ===== Information flow labels below ===== -->
  <rect x="50" y="476" width="860" height="84" rx="6" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="480" y="494" text-anchor="middle" font-size="10.5" font-weight="600" fill="#4A5568">Forward Pass Summary</text>
  <text x="480" y="510" text-anchor="middle" font-size="9.5" fill="#718096">Raw ticks → Lévy-Itô decomposition → Z_t = (Σ_τ, ν_η) → MFG HJB+FPK system (DGM solver) → unique m* (Schauder+Lasry-Lions)</text>
  <text x="480" y="524" text-anchor="middle" font-size="9.5" fill="#718096">→ McKean-Vlasov dynamics → Stochastic Lyapunov stability → Cramér-Rao uncertainty floor → u*(t) trading signal</text>
  <text x="480" y="542" text-anchor="middle" font-size="9" fill="#A0AEC0">Each module corresponds to a theorem in the companion paper. The groupoid extension handles dimension-changing financial events (mergers, listings, delistings).</text>
  <text x="480" y="556" text-anchor="middle" font-size="9" fill="#A0AEC0">HJB = Hamilton-Jacobi-Bellman · FPK = Fokker-Planck-Kolmogorov · DGM = Deep Galerkin Method · MFG = Mean-Field Game</text>
</svg>
